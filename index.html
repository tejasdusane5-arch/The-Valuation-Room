<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Valuation Room Pro</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

nav h1 {
  color: #22c55e;
}

/* HERO */
.hero {
  padding: 60px;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  color: #94a3b8;
}

/* TICKER */
.ticker {
  background: #020617;
  padding: 10px;
  overflow: hidden;
  white-space: nowrap;
}

.ticker span {
  display: inline-block;
  margin-right: 40px;
  color: #22c55e;
}

/* DASHBOARD GRID */
.dashboard {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  padding: 40px;
}

/* CARD */
.card {
  background: #020617;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #1e293b;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #22c55e;
}

/* STOCK LIST */
.stock {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #1e293b;
}

/* CHART */
canvas {
  width: 100% !important;
}

/* BUTTON */
button {
  background: #22c55e;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  border-radius: 8px;
}

/* RESPONSIVE */
@media(max-width: 900px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<nav>
  <h1>The Valuation Room</h1>
  <div>Dashboard</div>
</nav>

<section class="hero">
  <h1>Track Markets Like a Pro</h1>
  <p>Live NIFTY 50 insights, portfolio tracking & smart investing</p>
</section>

<!-- TICKER -->
<div class="ticker" id="ticker"></div>

<!-- DASHBOARD -->
<div class="dashboard">

  <!-- CHART -->
  <div class="card">
    <h2>NIFTY 50 Trend</h2>
    <canvas id="chart"></canvas>
  </div>

  <!-- STOCK LIST -->
  <div class="card">
    <h2>Top NIFTY Stocks</h2>
    <div id="stocks"></div>
  </div>

</div>

<script>
// SIMULATED LIVE DATA
const stocks = [
  {name: "Reliance", price: 2950},
  {name: "TCS", price: 3800},
  {name: "HDFC Bank", price: 1600},
  {name: "Infosys", price: 1500},
  {name: "ICICI Bank", price: 1050}
];

// UPDATE STOCK LIST
function updateStocks() {
  let html = "";
  stocks.forEach(s => {
    let change = (Math.random() * 20 - 10).toFixed(2);
    let color = change >= 0 ? "#22c55e" : "red";
    s.price += parseFloat(change);

    html += `
      <div class="stock">
        <span>${s.name}</span>
        <span style="color:${color}">
          ₹${s.price.toFixed(2)} (${change})
        </span>
      </div>
    `;
  });

  document.getElementById("stocks").innerHTML = html;
}
setInterval(updateStocks, 2000);
updateStocks();

// TICKER
function updateTicker() {
  let text = "";
  stocks.forEach(s => {
    text += `${s.name}: ₹${s.price.toFixed(2)} ▲ | `;
  });
  document.getElementById("ticker").innerHTML = `<span>${text}</span>`;
}
setInterval(updateTicker, 2000);

// CHART
const ctx = document.getElementById("chart").getContext("2d");

const data = {
  labels: ["1","2","3","4","5","6","7"],
  datasets: [{
    label: "NIFTY",
    data: [22000, 22200, 22100, 22500, 22300, 22600, 22800],
    borderWidth: 2
  }]
};

new Chart(ctx, {
  type: "line",
  data: data
});
</script>

</body>
</html>
